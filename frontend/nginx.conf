server {
    listen 8080;
    server_name _;
    server_tokens off;                 # don't leak the nginx version

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 512k;         # API payloads are tiny; cap to limit abuse

    # ---- gzip (performance: ~3x smaller JS/CSS transfer) ----
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # ---- security headers (inherited by / and the proxied /api) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;                # anti-clickjacking
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # ---- API -> backend (same origin, so no CORS needed in the browser) ----
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;           # used by backend rate limiter
        proxy_read_timeout 180s;                            # agent + Prophet can be slow
        proxy_send_timeout 180s;
    }

    # ---- content-hashed assets: cache hard (safe, the hash changes on rebuild) ----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
