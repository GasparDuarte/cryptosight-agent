# CryptoSight Agent — stack completo (backend FastAPI + frontend nginx)
#
#   Levantar todo:   docker compose up --build
#   Frontend:        http://localhost:5173
#   API / docs:      http://localhost:8000/docs
#   Apagar:          docker compose down
#
# La API key de Claude se toma de backend/.env (opcional: sin key corre en
# modo determinístico sin LLM).

services:
  backend:
    build: ./backend
    container_name: cryptosight-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cryptosight-frontend
    ports:
      - "5173:8080"
    depends_on:
      - backend
    restart: unless-stopped
